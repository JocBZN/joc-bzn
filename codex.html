<title>JOC-BZN — Codex de upgrade-uri</title>

<style>
  :root {
    --ground: #08070F;
    --ground-2: #0E0C1B;
    --panel: #14192B;
    --panel-2: #1B2138;
    --line: #2A3352;
    --ink: #E6ECFA;
    --ink-dim: #97A3C4;
    --ink-faint: #5F6C8E;
    --cyan: #33E6FF;
    --magenta: #FF3399;
    --gold: #FFD933;

    --common: #424B6D;
    --uncommon: #838BA5;
    --rare: #3AA04C;
    --epic: #7A16E1;
    --legendary: #EC7267;

    --display: "Segoe UI", system-ui, -apple-system, sans-serif;
    --mono: ui-monospace, "Cascadia Mono", Consolas, "DejaVu Sans Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(120% 80% at 50% 0%, #171033 0%, transparent 60%),
      linear-gradient(180deg, var(--ground-2) 0%, var(--ground) 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--display);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: clamp(28px, 5vw, 64px) clamp(16px, 4vw, 40px) 96px;
  }

  .hero { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

  .title {
    margin: 0;
    font-size: clamp(40px, 8vw, 76px);
    font-weight: 800;
    letter-spacing: 0.02em;
    line-height: 1.05;
    color: var(--cyan);
    text-wrap: balance;
    text-shadow:
      -2px -2px 0 var(--magenta), 2px -2px 0 var(--magenta),
      -2px  2px 0 var(--magenta), 2px  2px 0 var(--magenta),
      0 0 28px rgba(255, 51, 153, 0.55);
  }

  .kicker {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .lede { max-width: 62ch; color: var(--ink-dim); font-size: 17px; margin: 6px 0 0; }

  .rule {
    height: 1px; border: 0; margin: 40px 0 34px;
    background: linear-gradient(90deg, var(--cyan), transparent 70%); opacity: 0.5;
  }

  .sec-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  h2 { margin: 0; font-size: clamp(22px, 3vw, 30px); font-weight: 700; letter-spacing: 0.01em; }
  .sec-note { color: var(--ink-faint); font-size: 14px; font-family: var(--mono); }
  .sec-lede { max-width: 66ch; color: var(--ink-dim); margin: 10px 0 0; }

  .tier { margin-top: 40px; }
  .tier-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .tier-name {
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.26em; text-transform: uppercase; color: var(--tier);
  }
  .tier-line { flex: 1; height: 2px; background: linear-gradient(90deg, var(--tier), transparent); opacity: 0.5; }
  .tier-count { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

  .card {
    display: grid; grid-template-columns: 104px 1fr; gap: 16px; padding: 16px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--line); border-left: 3px solid var(--tier); border-radius: 4px;
  }
  .card.new { border-color: rgba(51, 230, 255, 0.45); }

  .slot {
    position: relative; width: 104px; height: 104px; display: grid; place-items: center;
    background-repeat: no-repeat; background-position: center; background-size: 100% 100%;
    image-rendering: pixelated;
  }
  .slot img { width: 60%; height: 60%; object-fit: contain; image-rendering: pixelated; }

  .card-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .name { font-size: 19px; font-weight: 700; line-height: 1.25; color: var(--ink); }
  .id { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-faint); }
  .id::before { content: "id: "; opacity: 0.65; }

  .tag-new {
    display: inline-block; margin-left: 6px; padding: 2px 7px; vertical-align: 2px; border-radius: 3px;
    background: var(--cyan); color: #04121A; font-family: var(--mono); font-size: 10px;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  }

  .effect { font-size: 14.5px; color: var(--ink-dim); margin: 2px 0 0; }
  .effect b { color: var(--ink); font-weight: 600; }

  .warn {
    display: inline-flex; align-items: center; gap: 6px; align-self: flex-start; margin-top: 4px;
    padding: 3px 9px; border: 1px solid rgba(255, 217, 51, 0.4); background: rgba(255, 217, 51, 0.09);
    border-radius: 3px; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--gold);
  }

  .shop-scroll { overflow-x: auto; margin-top: 26px; }
  table { width: 100%; min-width: 560px; border-collapse: collapse; font-size: 15px; }
  th {
    text-align: left; padding: 10px 14px; font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint);
    border-bottom: 1px solid var(--line); font-weight: 600;
  }
  td { padding: 12px 14px; border-bottom: 1px solid rgba(42, 51, 82, 0.5); color: var(--ink-dim); }
  td:first-child { color: var(--ink); font-weight: 600; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; text-align: right; }
  .coin { color: var(--gold); }

  .notes { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-top: 28px; }
  .note {
    padding: 18px 20px; background: rgba(20, 25, 43, 0.6); border: 1px solid var(--line);
    border-top: 2px solid var(--accent, var(--cyan)); border-radius: 4px;
  }
  .note h3 { margin: 0 0 8px; font-size: 16px; font-weight: 700; color: var(--accent, var(--cyan)); }
  .note p { margin: 0; font-size: 14.5px; color: var(--ink-dim); }
  .note b { color: var(--ink); font-weight: 600; }

  code {
    font-family: var(--mono); font-size: 0.9em; padding: 1px 5px;
    background: rgba(51, 230, 255, 0.09); border: 1px solid rgba(51, 230, 255, 0.18);
    border-radius: 3px; color: var(--cyan);
  }

  footer {
    margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--line);
    font-family: var(--mono); font-size: 12px; color: var(--ink-faint);
  }
</style>

const RAR_LABEL = Object.fromEntries(RARS);

function el(tag, cls, html) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html != null) n.innerHTML = html;
  return n;
}

const app = document.getElementById("app");

// hero
const hero = el("header", "hero");
hero.append(
  el("div", "kicker", "Codex"),
  el("h1", "title", "JOC-BZN"),
  el("p", "lede",
    "Toate upgrade-urile din joc, cu efectele lor <strong>reale</strong> — citite direct din cod " +
    "(<code>levelup.gd</code> și <code>player.gd</code>), nu din descrierile afișate în joc. " +
    "Chenarele sunt exact cele din meniul de level up.")
);
app.append(hero, el("hr", "rule"));

// sectiunea de upgrade-uri
const sec = el("section");
const head = el("div", "sec-head");
head.append(el("h2", null, "Upgrade-uri de rundă"),
  el("span", "sec-note", ITEMS.length + " în total · la fiecare nivel primești 3 la întâmplare"));
sec.append(head,
  el("p", "sec-lede", "Se pierd la finalul rundei. Multe se pot lua de mai multe ori — unde asta contează, scrie pe card."));

for (const [rk, rl] of RARS) {
  const items = ITEMS.filter(i => i.rar === rk);
  if (!items.length) continue;
  const tier = el("div", "tier");
  tier.style.setProperty("--tier", "var(--" + rk + ")");
  const th = el("div", "tier-head");
  th.append(el("span", "tier-name", rl), el("span", "tier-line"), el("span", "tier-count", String(items.length)));
  tier.append(th);
  const grid = el("div", "grid");
  for (const it of items) {
    const card = el("article", "card" + (it.isNew ? " new" : ""));
    card.style.setProperty("--tier", "var(--" + rk + ")");
    const slot = el("div", "slot");
    slot.style.backgroundImage = "url('" + BORDERS[rk] + "')";
    const img = el("img");
    img.src = ICONS[it.icon];
    img.alt = it.name;
    slot.append(img);
    const body = el("div", "card-body");
    body.append(
      el("div", "name", it.name + (it.isNew ? '<span class="tag-new">nou</span>' : "")),
      el("div", "id", it.id),
      el("p", "effect", it.eff)
    );
    if (it.warn) body.append(el("span", "warn", it.warn));
    card.append(slot, body);
    grid.append(card);
  }
  tier.append(grid);
  sec.append(tier);
}
app.append(sec, el("hr", "rule"));

// magazin permanent (META)
const shop = el("section");
const sh = el("div", "sec-head");
sh.append(el("h2", null, "Magazin permanent"),

const scroll = el("div", "shop-scroll");
const table = el("table");
table.innerHTML =
  "<thead><tr><th>Upgrade</th><th>Per nivel</th><th class='num'>Cost de bază</th><th class='num'>Nivel max</th></tr></thead>";
const tb = el("tbody");
for (const m of META) {
  const tr = el("tr");
  tr.innerHTML = "<td>" + m.name + "</td><td>" + m.per + "</td>" +
    "<td class='num coin'>" + m.cost + "</td><td class='num'>" + m.max + "</td>";
  tb.append(tr);
}
table.append(tb);
scroll.append(table);
shop.append(scroll);
app.append(shop, el("hr", "rule"));
